name: RestNot
options:
  bundleIdPrefix: com.mythicstudio
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  RestNot:
    type: application
    platform: macOS
    sources:
      - path: RestNot
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mythicstudio.restnot
        PRODUCT_NAME: RestNot
        INFOPLIST_FILE: Info.plist
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    dependencies:
      - sdk: IOKit.framework
